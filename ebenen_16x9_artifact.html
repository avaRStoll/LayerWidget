</div>

<script>
var sm=false,ss=0,tot=6;
var ov=['story-origin','hl-L4','hl-L3','hl-L2','hl-L1','line-54','line-43','line-32','line-21','badge-L4','badge-L3','badge-L2','badge-L1'];
var steps=[
  {t:'Schritt 1: Information entsteht auf Ebene 5 – Bauteil',
   d:'Im Spezifikations-Cluster der Bauteilebene entsteht eine konkrete Information: <strong>"Bildverarbeitungschip – Ausfallrate 0.003%"</strong>. Sie existiert genau hier – nicht kopiert, sondern referenzierbar.',
   s:['story-origin'],l:{1:0.15,2:0.15,3:0.15,4:0.15,5:1}},
  {t:'Schritt 2: Ebene 4 (Komponente) referenziert und erweitert',
   d:'Die Ausfallrate wird im Komponenten-RM referenziert. Daraus entsteht eine <strong>neue</strong> Information: FMEA-Zeile "Bildverarbeitungsfehler → mögliche Fehlnavigation". Nicht kopiert – aufgebaut.',
   s:['line-54','hl-L4','badge-L4'],l:{1:0.15,2:0.15,3:0.15,4:1,5:0.4}},
  {t:'Schritt 3: Ebene 3 (Produkt) bewertet das Produktrisiko',
   d:'Das Produkt-RM referenziert die FMEA aus Ebene 4. Neues Objekt: <strong>"Produktrisiko R-042: Fehlnavigation – Schweregrad 3"</strong>. Das Produkt bewertet das Risiko in seinem Kontext.',
   s:['line-43','hl-L3','badge-L3'],l:{1:0.15,2:0.15,3:1,4:0.4,5:0.15}},
  {t:'Schritt 4: Ebene 2 (System) aggregiert Risiken',
   d:'System-RM greift auf alle Produktrisiken zu. Es entsteht: <strong>"Systemrisiko Navigation – übergreifend CT + Roboter + Navigation"</strong>. Neue Information durch Kontext und Kombination.',
   s:['line-32','hl-L2','badge-L2'],l:{1:0.15,2:1,3:0.4,4:0.15,5:0.15}},
  {t:'Schritt 5: Ebene 1 – Benefit-Risk-Analyse',
   d:'Die klinische Ebene referenziert das Systemrisiko und erstellt: <strong>"Nutzen überwiegt Restrisiko – Zulassung empfohlen"</strong>. Klinische Bewertung – gegründet auf allem darunter.',
   s:['line-21','hl-L1','badge-L1'],l:{1:1,2:0.4,3:0.15,4:0.15,5:0.15}},
  {t:'Fazit: Eine Quelle – viele Verwendungen',
   d:'Die Ausfallrate (Ebene 5) wurde <strong>nie kopiert</strong>. Sie wurde referenziert, bewertet und erweitert. Jede Ebene erzeugte eigene Information – aufbauend auf der darunter. Ändert sich die Quelle, ändert sich der gesamte Pfad.',
   s:[],l:{1:1,2:1,3:1,4:1,5:1}}
];
function sh(id){var e=document.getElementById(id);if(e)e.setAttribute('opacity','1');}
function hi(id){var e=document.getElementById(id);if(e)e.setAttribute('opacity','0');}
function setL(l){for(var i=1;i<=5;i++){var e=document.getElementById('L'+i);if(e)e.style.opacity=l[i]!==undefined?l[i]:1;}}
function render(s){
  var st=steps[s];
  document.getElementById('step-lbl').textContent=(s+1)+' / '+tot;
  document.getElementById('btn-prev').disabled=s===0;
  document.getElementById('btn-next').disabled=s===tot-1;
  document.getElementById('btn-next').textContent=s===tot-2?'Fazit →':s===tot-1?'–':'Weiter →';
  setL(st.l); st.s.forEach(sh);
  document.getElementById('det').innerHTML='<strong>'+st.t+'</strong><br><span style="color:#555;">'+st.d+'</span>';
}
function startStory(){
  sm=true;ss=0;
  document.getElementById('nav-controls').style.display='flex';
  document.getElementById('btn-story').classList.add('active');
  ov.forEach(hi); render(0);
}
function storyNext(){if(ss<tot-1){ss++;render(ss);}}
function storyPrev(){if(ss>0){steps[ss].s.forEach(hi);ss--;render(ss);}}
var lN={1:'Klinischer Workflow',2:'System',3:'Produkt',4:'Komponente',5:'Bauteil'};
var lC={1:'#7a1100',2:'#5a4400',3:'#1a4a1a',4:'#0a2040',5:'#333'};
function selectLayer(n){
  if(sm)return;
  document.getElementById('det').innerHTML='<strong style="color:'+lC[n]+';">Ebene '+n+': '+lN[n]+'</strong><br><span style="color:#555;">Klicke auf einen Daten-Cluster für Details.</span>';
  for(var i=1;i<=5;i++){var e=document.getElementById('L'+i);if(e)e.style.opacity=(i===n)?'1':'0.2';}
}
function selectCluster(evt,layer,cluster,desc){
  if(sm)return; evt.stopPropagation();
  var inactive=desc.indexOf('Nicht anwendbar')===0;
  document.getElementById('det').innerHTML=
    '<strong style="color:'+lC[layer]+';">'+cluster+'</strong> <span style="font-size:11px;color:#aaa;">· Ebene '+layer+' ('+lN[layer]+')</span><br>'+
    '<span style="color:#555;">'+desc+'</span>'+
    (inactive?'':'<br><em style="font-size:11px;color:#aaa;">Wird hier erzeugt – referenzierbar von höheren Ebenen.</em>');
  for(var i=1;i<=5;i++){var e=document.getElementById('L'+i);if(e)e.style.opacity=(i==layer)?'1':'0.18';}
}
function resetAll(){
  sm=false;ss=0;
  document.getElementById('nav-controls').style.display='none';
  document.getElementById('btn-story').classList.remove('active');
  ov.forEach(hi);
  for(var i=1;i<=5;i++){var e=document.getElementById('L'+i);if(e)e.style.opacity='1';}
  document.getElementById('det').innerHTML='<em style="color:#aaa;">Klicke auf eine Ebene oder einen Cluster – oder starte den Story-Modus.</em>';
}
</script>
</body>
</html>
